services:
  web:
    build:
      context: .
    image: brazcar:local
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: brazcar
      POSTGRES_USER: brazcar
      POSTGRES_PASSWORD: brazcar
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brazcar -d brazcar"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
