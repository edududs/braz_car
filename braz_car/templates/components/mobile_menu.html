<!-- Mobile Menu Component -->
<div class="md:hidden">
  <button id="mobile-menu-button" 
          class="text-gray-700 hover:text-gray-900 focus:outline-none focus:text-gray-900">
    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
    </svg>
  </button>
  
  <!-- Mobile Menu Dropdown -->
  <div id="mobile-menu" 
       class="absolute top-16 left-0 right-0 bg-white border-t border-gray-200 shadow-lg opacity-0 invisible transition-all duration-200 z-40">
    <div class="px-4 py-2 space-y-1">
      <a href="{% url 'braz_car:index' %}" 
         class="block px-3 py-2 text-blue-500 font-medium hover:bg-blue-50 rounded-lg">
        Carona
      </a>
      <a href="#" 
         class="block px-3 py-2 text-blue-500 font-medium hover:bg-blue-50 rounded-lg">
        Ônibus
      </a>
      <a href="#" 
         class="block px-3 py-2 text-blue-500 font-medium hover:bg-blue-50 rounded-lg">
        Central de Ajuda
      </a>
      <hr class="my-2">
      <a href="#" 
         class="block px-3 py-2 text-gray-700 hover:bg-gray-50 rounded-lg">
        Oferecer carona
      </a>
      {% if not user.is_authenticated %}
        <div class="px-3 py-2">
          <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Conta</div>
          <a href="{% url 'users:login' %}" 
             class="block px-3 py-2 text-gray-700 hover:bg-gray-50 rounded-lg">
            Entrar
          </a>
          <a href="{% url 'users:register' %}" 
             class="block px-3 py-2 text-gray-700 hover:bg-gray-50 rounded-lg">
            Cadastrar
          </a>
        </div>
      {% endif %}
    </div>
  </div>
</div>
