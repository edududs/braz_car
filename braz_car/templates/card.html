<div class="max-w-sm rounded-lg overflow-hidden shadow-lg bg-white hover:shadow-xl transition-shadow duration-300">
    <img class="w-full h-48 object-cover" src="{{ card.image_url }}" alt="{{ card.title }}">
    <div class="px-6 py-4">
        <h2 class="font-bold text-xl mb-2 text-gray-800">{{ card.title }}</h2>
        <p class="text-gray-700 text-base">{{ card.description }}</p>
    </div>
    <div class="px-6 pt-4 pb-2">
        {% if card.tags %}
            {% for tag in card.tags %}
                <span class="inline-block bg-gray-200 rounded-full px-3 py-1 text-sm font-semibold text-gray-700 mr-2 mb-2">
                    #{{ tag }}
                </span>
            {% endfor %}
        {% endif %}
    </div>
</div>
